<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Street Lifting"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="theme-color" content="#09090b"/>
<title>Street Lifting Tracker</title>
<link rel="manifest" href="manifest.json"/>
<link rel="apple-touch-icon" href="icon-180.png"/>
<link rel="apple-touch-startup-image" href="splash.png"/>
<link rel="preconnect" href="https://cdn.tailwindcss.com"/>
<link rel="preconnect" href="https://unpkg.com" crossorigin/>
<script src="https://cdn.tailwindcss.com"></script>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script crossorigin src="https://unpkg.com/prop-types@15.7.2/prop-types.min.js"></script>
<script crossorigin src="https://unpkg.com/recharts@2.12.7/umd/Recharts.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
:root{--accent:#f97316;--accent-amber:#f59e0b}
@supports (color: color(display-p3 1 1 1)){:root{--accent:color(display-p3 0.976 0.451 0.086);--accent-amber:color(display-p3 0.961 0.620 0.043)}}
html,body{background:#09090b;color:#f4f4f5;-webkit-font-smoothing:antialiased;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;margin:0;padding:0;overflow-x:hidden;overscroll-behavior-y:none}
body{min-height:100vh;min-height:-webkit-fill-available;min-height:100dvh}
#root{min-height:100vh;min-height:-webkit-fill-available;min-height:100dvh}
::-webkit-scrollbar{width:6px;height:6px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:#3f3f46;border-radius:3px}
input[type="number"]::-webkit-outer-spin-button,input[type="number"]::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}
input[type="number"]{-moz-appearance:textfield}
input,textarea{font-size:16px!important}
button,a,[role="button"]{touch-action:manipulation;-webkit-tap-highlight-color:transparent}
button,nav,header{user-select:none;-webkit-user-select:none;-webkit-touch-callout:none}
.accent-orange{color:var(--accent)}
.bg-accent-orange{background-color:var(--accent)}
.accent-amber{color:var(--accent-amber)}
.bg-accent-amber{background-color:var(--accent-amber)}
.animate-pulse{animation:pulse 2s cubic-bezier(.4,0,.6,1) infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" data-presets="react" src="app.jsx"></script>
<script>if('serviceWorker' in navigator){window.addEventListener('load',()=>navigator.serviceWorker.register('./sw.js').catch(console.error))}</script>
</body>
</html>
